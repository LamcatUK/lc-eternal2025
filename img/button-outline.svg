<svg viewBox="0 0 110 50" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon points="17 5,105 5,105 39,93 45,5 45,5 11"
           fill="none"
           stroke="currentColor"
           stroke-width="4"
           vector-effect="non-scaling-stroke"
           filter="url(#shadow)"/>
</svg>
